name: CD

on:
  push:
    branches: [main, develop]

# Required for Workload Identity Federation
permissions:
  contents: read
  id-token: write

env:
  IMAGE_BASE: google-ai-notifier

jobs:
  # ── Resolve environment config from branch ───────────────────────────────────
  setup:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.cfg.outputs.environment }}
      tf_bucket:   ${{ steps.cfg.outputs.tf_bucket }}
      tf_prefix:   ${{ steps.cfg.outputs.tf_prefix }}
      var_file:    ${{ steps.cfg.outputs.var_file }}

    steps:
      - id: cfg
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=production"                  >> "$GITHUB_OUTPUT"
            echo "tf_bucket=c3b-ainotifier-prod"          >> "$GITHUB_OUTPUT"
            echo "tf_prefix=terraform"                    >> "$GITHUB_OUTPUT"
            echo "var_file=environments/prod.tfvars"      >> "$GITHUB_OUTPUT"
          else
            echo "environment=development"                >> "$GITHUB_OUTPUT"
            echo "tf_bucket=c3b-ainotifier-dev"           >> "$GITHUB_OUTPUT"
            echo "tf_prefix=terraform"                    >> "$GITHUB_OUTPUT"
            echo "var_file=environments/dev.tfvars"       >> "$GITHUB_OUTPUT"
          fi

  # ── Gate: lint + test must pass before we touch infrastructure ──────────────
  test:
    name: Lint & Test
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ── Build Docker image and push to Artifact Registry ────────────────────────
  build:
    name: Build & Push Image
    needs: [setup, test]
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    outputs:
      image_url: ${{ steps.meta.outputs.image_url }}
      digest:    ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: |
          REGION=$(grep '^region' "terraform/${{ needs.setup.outputs.var_file }}" | awk -F'"' '{print $2}')
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Set image base URL
        id: meta
        run: |
          VAR_FILE="terraform/${{ needs.setup.outputs.var_file }}"
          REGION=$(grep '^region' "$VAR_FILE" | awk -F'"' '{print $2}')
          PROJECT=$(grep '^project_id' "$VAR_FILE" | awk -F'"' '{print $2}')
          echo "image_url=${REGION}-docker.pkg.dev/${PROJECT}/${{ env.IMAGE_BASE }}/${{ env.IMAGE_BASE }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_url }}:${{ github.sha }}
            ${{ steps.meta.outputs.image_url }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Terraform: provision / update GCP infrastructure ────────────────────────
  terraform:
    name: Terraform Apply (${{ needs.setup.outputs.environment }})
    needs: [setup, build]
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ needs.setup.outputs.tf_bucket }}" \
            -backend-config="prefix=${{ needs.setup.outputs.tf_prefix }}"

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan -out=tfplan \
            -var-file="${{ needs.setup.outputs.var_file }}" \
            -var="image_url=${{ needs.build.outputs.image_url }}@${{ needs.build.outputs.digest }}" \
            -var="github_repo=${{ github.repository }}"

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

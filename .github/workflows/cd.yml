name: CD

on:
  push:
    branches: [main]

# Required for Workload Identity Federation
permissions:
  contents: read
  id-token: write

env:
  REGION: us-central1
  IMAGE_BASE: google-ai-notifier

jobs:
  # ── Gate: lint + test must pass before we touch infrastructure ──────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ── Build Docker image and push to Artifact Registry ────────────────────────
  build:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_url: ${{ steps.meta.outputs.image_url }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image metadata
        id: meta
        run: |
          BASE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_BASE }}/${{ env.IMAGE_BASE }}"
          echo "image_url=${BASE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_url }}:${{ github.sha }}
            ${{ steps.meta.outputs.image_url }}:latest
          # Use GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Terraform: provision / update GCP infrastructure ────────────────────────
  terraform:
    name: Terraform Apply
    needs: build
    runs-on: ubuntu-latest
    environment: production   # Optional: add a GitHub Environment for approval gates

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=google-ai-notifier"

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan -out=tfplan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="image_url=${{ needs.build.outputs.image_url }}@${{ needs.build.outputs.digest }}" \
            -var="chat_space_name=${{ secrets.CHAT_SPACE_NAME }}" \
            -var="github_repo=${{ github.repository }}"

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan
